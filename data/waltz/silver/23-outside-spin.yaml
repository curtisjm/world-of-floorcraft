notes:
- 'The Outside Spin may be underturned to back DC. Amounts of turn would be: LEADER: ⅝ from backing DW: ⅝ on 1, ⅛ between
  2-3. FOLLOWER: ⅜ from facing DW and ⅛ on 1: ⅛ on step 2, ⅛ between 2-3. LEADER: ⅜ from facing DW to backing DC: ⅝ on 1,
  ⅛ between 2-3. FOLLOWER: ⅛ from facing DW against LOD: ⅛ between 1-2, ⅛ between 2-3. ⅛ from facing DW against LOD to backing
  DC: ⅛ between 1-2, ⅜ between 2-3. When the Outside Spin is underturned, the foot position of step 3 will be ''side and slightly
  back'' (Leader) and ''diag. fwd'' (Follower) as in step 6 Natural Spin Turn and step 3 Closed Impetus.'
