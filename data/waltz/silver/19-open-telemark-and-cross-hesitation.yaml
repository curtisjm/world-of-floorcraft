    feet_position: LF to side and fwd in PP
    rise_and_fall: Up. Lower e/o 3
    step_number: 3
  - alignment: Pointing DW. Body facing wall
    amount_of_turn: null
    feet_position: RF fwd in PP and CBMP
    rise_and_fall: Com to rise e/o 4
