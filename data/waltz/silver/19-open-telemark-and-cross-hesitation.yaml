notes:
- The Cross Hesitation can be used from other positions and may be overturned. If overturned, the position of the RF will
  be 'forward and across'. There is no foot swivel on step 4 unless the Cross Hesitation is overturned. Normal ending is a
  step back with Follower Outside.
