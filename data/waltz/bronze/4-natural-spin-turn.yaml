notes:
- Although the footwork on step 4 is TILT the Heel is in contact with the floor during the actual turn. When the Natural Spin
  Turn is danced at a corner or underturned along the side of the room the amount of turn is ⅛ on the pivot and ⅛ between
  5-6.
- The Heel is taken from the heel of LF on step 5, and it is important to note that as the RF commences to move to brush to
  LF the ball of RF not the Heel is in contact with the floor. When the Natural Spin Turn is danced at a corner or underturned
  along the side of the room the amount of turn is ⅛ on the pivoting action and ⅛ between 5-6.
