notes:
- 'A The Progressive Chassé to R could be commenced facing LOD and ended backing DW by turn) when the amounts of turn would
  be: Leader: ¼ between 1-2 (body turns less), Body completes turn on 3, ⅛ turn between 3-4. Follower: ⅛ between 1-2 (body
  turns less), slight body turns to L on 3, ⅛ to further turn. L) Commenced facing DC and ended backing LOD (⅛ turns), or
  commenced facing DW and ending backing DC (⅜ turns). If ⅛ turns is made the amounts of turn will be: Leader: ⅛ between 1-2,
  ⅛ between 2-3, ⅛ between 3-4. Follower: ⅛ between 1-2 (body turns less). Body completes turn on 3, ⅛ between 3-4 (body turns
  less).'
