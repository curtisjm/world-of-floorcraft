notes:
- The Footwork of step 3 is given as IE of B to indicate that the Heel lowers the line.
- As for Open Reverse Turn Follower outside.
- ENDINGS
- 1 Transfer weight to RF and place LF to side in PP without weight, QQ
- 2 Close RF to LF and place LF to side in PP without weight, & S
- 3 Chase to R, RLR, cross LF behind RF in PP into Whisk, RF fwd and across in PP and CBMP, place LF to side in PP without
  weight, Q&QSQQ or Q&QQQS
- 4 Chase and Whisk as no. 3 above, 2-3 Promenade Link, Q&QSQQ or Q&QQQS
- 5 Chase and Whisk as no. 3 above then close RF to LF and place LF to side in PP without weight, Q&QSQS
- 6 Chase to R, RL, to complete turn, then close LF to RF to side in PP without weight, QQQQ, QQQQ&QQ or QQQQ&QQQ
- 7 Spin to R, RL, then continue as no. 3 above, QQQ&QSQQ or QQQ&QQS — no. 4 above, QQQ&QSQQ or QQQ&QQQS — no. 5 above, QQQ&QSQS
- 'DROP OVERSWAY: This advanced method of dancing the Oversway is to dance steps 1-3 and hold the position, keeping quite
  still, body tilted slightly to L, Follower to R with her head to R, QQS. Keep the feet in place and change abruptly to R
  away, lowering into L knee also lowering R shoulder and turning head slightly to R, Follower to L, S.'
