notes:
- If the Four Step is commenced facing DW the direction of the first step will be DW. The Leader could then make no turn between
  1-2 and end facing DW, or turn to L between 2-3 to end facing wall. If commenced facing DC to move to centre.
- When facing DW near a corner, Leader could turn ¼ to L between 1-2 to end facing DW of new LOD to follow with a Promenade
  figure moving DC, or he could turn ⅛ to L between 1-2 to face wall to follow with a Promenade figure moving DW of new LOD.
- The Four Step could be commenced DC and turn:— 1. ⅛ to L to end facing DW against LOD. 2. ⅛ to L to end facing wall. 3.
  ⅛ to L to end facing DW.
- The Outside Swivel could be danced after 1-2 Four Step.
