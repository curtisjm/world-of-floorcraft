notes:
- On step 4 the Footwork of TH may be used. The Rise on 5 will then be 'Up NFR'
- Alternative alignments for the Weave from PP may be found in the Waltz charts. Figure 17.
- 'There are five important alignments of the Reverse Wave: (a) Facing LOD ¼ between 1-3; ¾ between 4-6, ¾ between 7-8 (or
  less at a corner). (b) Facing LOD ¼ between 1-2; ⅛ between 2-3; ¾ between DW of new LOD, ½ between 6-7. (c) Facing DW ¼
  between 1-3, then continue as in alignment (a). (d) Facing DC ⅛ between 2-3, then starting as in alignment (b). (e) Facing
  DW to new LOD ¼ between 1-2; ⅜ between 2-3; ¼ between 7-8. Alignment (b) (d) and (e) are used round a corner.'
