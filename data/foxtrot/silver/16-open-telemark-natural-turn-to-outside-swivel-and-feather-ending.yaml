notes:
- The RF commences to pivot on step 7 in such case the alignment of the Weave from PP may be in the Closed Ending used to
  return to the Heel of the Weave at the bottom of a wall or in a corner when the Top Spin, ½ turn to R is made on step 7
  and 8-10 will be taken DC and may be danced following this underturned Outside Swivel. Leader using the Heel in contact
  with the floor and the Natural Turn Outside Swivel is entire step 8-11 will be taken DC of new LOD. Follow as for Feather.
- The Outside Swivel (steps 7-8) could be danced by checking QP on any Feather Movement taken DC and turning to to R. Follow
  — L — Feather Ending — Natural Turn to Outside Swivel and Feather Ending — Natural Telemark — Natural Twist Turn to Natural
  Feather to PP — Natural Zig-Zag from PP. Back Feather from PP — Natural Zig-Zag from PP
- The Outside Swivel (steps 7-8) could also be danced by checking QP on any Feather taken DW without turn and followed as
  in the previous paragraph.
