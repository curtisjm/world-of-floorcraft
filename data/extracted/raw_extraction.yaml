  leader:
    cbm: null
    footwork: null
    steps: []
    sway: null
  notes:
  - The differences in the Tango Walk as compared to the other dances are:—
  - 1. There is no Rise and Fall.
  - 2. The knees are held very slightly flexed and tone is maintained in the leg muscles.
  - 3. Because of the Tango position, the LF Walk is taken in CBMP and the RF Walk is taken with a R side lead. In a similar
    way, the RF Walk back is taken in CBMP and the LF Walk back with a L side lead. The Walk will normally curve to L.
  - 4. The feet are slightly lifted and placed on each step — rather than gliding to position as in the other dances.
  - 5. The feet are moved with a turn of staccato action and the back foot on a Forward Walk is delayed as long as the music
    will allow. The Backward Walk is danced with a similar action.
  - 6. When stepping forward in CBMP on LF and taking into account the curve to the L, it is important that the L heel is
    placed on, not across, the line of the RF. When stepping back in CBMP on RF, in a similar way the R toe is placed on,
    not across, the line of the LF.
  - 7. If the Follower's step takes a curve to the R at the conclusion of a figure, as danced at RF commences to move back into
    the following step. At the commencement of all other back steps the toe of the front foot will be released. When the Follower
    steps back on either foot the front toe will be released.
  precede: {}
  timing: null
  variant_name: null
